version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - node -v
        build:
          commands:
            - |
              set -euxo pipefail
              echo "USING-REPO-AMPLIFY-YML ✅  (cwd=$(pwd))"

              # 0) Clean staging
              rm -rf .amplify-hosting
              mkdir -p .amplify-hosting/static
              mkdir -p .amplify-hosting/compute/default/apps

              # 1) Static
              cp -R apps/frontend/public/* .amplify-hosting/static/ || true
              printf "window.__AIPM_API_BASE__ = '';
" > .amplify-hosting/static/config.js

              # 2) Compute bundle
              test -d apps/backend || (echo "ERROR: apps/backend missing" >&2; exit 11)
              test -f apps/backend/app.js || (echo "ERROR: apps/backend/app.js missing" >&2; exit 12)
              test -f apps/backend/server-backend.js || (echo "ERROR: apps/backend/server-backend.js missing" >&2; exit 13)
              cp -R apps/backend .amplify-hosting/compute/default/apps/

              # include repo-root server.js so ../../server.js can be staged, if present
              if [ -f server.js ]; then cp server.js .amplify-hosting/compute/default/server.js; fi

              # 3) Manifest
              test -f deploy-manifest.json || (echo "ERROR: deploy-manifest.json missing at repo root" >&2; exit 14)
              cp deploy-manifest.json .amplify-hosting/deploy-manifest.json

              # 4) Sanity logs
              echo "== TREE .amplify-hosting =="
              find .amplify-hosting -maxdepth 3 -type d -print
              echo "== COMPUTE FILES =="
              ls -la .amplify-hosting/compute/default || true
              echo "== MANIFEST (first 40 lines) =="
              head -n 40 .amplify-hosting/deploy-manifest.json
      artifacts:
        baseDirectory: .amplify-hosting/static
        files: ['**/*']
      cache:
        paths: ['node_modules/**/*']
